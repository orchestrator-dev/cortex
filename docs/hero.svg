<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bg" cx="40%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#12191F"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#0D1117"/>
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- ─── Left: Logotype ─── -->

  <!-- CORTEX wordmark -->
  <text
    x="82" y="162"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="80" font-weight="700"
    fill="#E6EDF3"
    letter-spacing="-1">CORTEX</text>

  <!-- CMS sub-label -->
  <text
    x="87" y="197"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="27" font-weight="300"
    fill="#7D8590">CMS</text>

  <!-- Tagline -->
  <text
    x="82" y="238"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="13" font-weight="400"
    fill="#58A6FF"
    letter-spacing="0.13em">AI-NATIVE CONTENT INFRASTRUCTURE</text>

  <!-- Divider -->
  <line x1="82" y1="265" x2="480" y2="265" stroke="#21262D" stroke-width="1"/>

  <!-- ─── Bottom badges ─── -->
  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11.5" fill="#7D8590">

    <rect x="82" y="350" width="106" height="26" rx="13" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="135" y="368" text-anchor="middle">TypeScript</text>

    <rect x="196" y="350" width="76" height="26" rx="13" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="234" y="368" text-anchor="middle">Python</text>

    <rect x="280" y="350" width="190" height="26" rx="13" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <text x="375" y="368" text-anchor="middle">PostgreSQL + pgvector</text>
  </g>

  <!-- ─── Right: Node graph ─── -->

  <!-- Connecting lines (behind nodes) -->
  <g stroke="#30363D" stroke-width="1.5" opacity="0.75">
    <!-- central → all -->
    <line x1="950" y1="178" x2="838" y2="107"/>
    <line x1="950" y1="178" x2="1068" y2="102"/>
    <line x1="950" y1="178" x2="858" y2="258"/>
    <line x1="950" y1="178" x2="1074" y2="248"/>
    <line x1="950" y1="178" x2="950" y2="318"/>
    <line x1="950" y1="178" x2="800" y2="195"/>
    <!-- peripheral cross-links -->
    <line x1="838" y1="107" x2="800" y2="195"/>
    <line x1="1068" y1="102" x2="1074" y2="248"/>
    <line x1="858" y1="258" x2="950" y2="318"/>
    <line x1="950" y1="318" x2="1074" y2="248"/>
    <line x1="800" y1="195" x2="858" y2="258"/>
  </g>

  <!-- Nodes -->
  <!-- Central node — largest, blue, with outer ring -->
  <circle cx="950" cy="178" r="24" fill="#58A6FF" opacity="0.92"/>
  <circle cx="950" cy="178" r="32" fill="none" stroke="#58A6FF" stroke-width="1.5" opacity="0.22"/>

  <!-- Node 2: green — top left -->
  <circle cx="838" cy="107" r="13" fill="#3FB950" opacity="0.85"/>

  <!-- Node 3: coral — top right -->
  <circle cx="1068" cy="102" r="12" fill="#F78166" opacity="0.82"/>

  <!-- Node 4: blue dim — bottom left -->
  <circle cx="858" cy="258" r="15" fill="#58A6FF" opacity="0.55"/>

  <!-- Node 5: green — bottom right -->
  <circle cx="1074" cy="248" r="11" fill="#3FB950" opacity="0.70"/>

  <!-- Node 6: coral — bottom centre -->
  <circle cx="950" cy="318" r="13" fill="#F78166" opacity="0.68"/>

  <!-- Node 7: blue small — far left -->
  <circle cx="800" cy="195" r="9" fill="#58A6FF" opacity="0.45"/>
</svg>

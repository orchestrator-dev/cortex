services:
  postgres:
    container_name: cortex-postgres
    image: docker.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cortex -d cortex" ]
      interval: "5s"
      timeout: "5s"
      retries: 5

  pgvector-init:
    container_name: cortex-pgvector-init
    profiles: [ "init" ]
    image: docker.io/pgvector/pgvector:pg16
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      psql postgresql://cortex:cortex@cortex-postgres:5432/cortex  -c "CREATE EXTENSION IF NOT EXISTS vector;"

  redis:
    container_name: cortex-redis
    image: docker.io/library/redis:7-alpine
    command: redis-server --appendonly yes --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: "5s"
      timeout: "5s"
      retries: 5

  minio:
    container_name: cortex-minio
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cortex
      MINIO_ROOT_PASSWORD: cortex_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: "5s"
      timeout: "5s"
      retries: 5

  minio-init:
    container_name: cortex-minio-init
    profiles: [ "init" ]
    image: docker.io/minio/mc:latest
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set cortex-local http://cortex-minio:9000 cortex cortex_secret; mc mb cortex-local/cortex-assets --ignore-existing; mc anonymous set download cortex-local/cortex-assets; "

  cortex-ai-worker:
    container_name: cortex-ai-worker
    build:
      context: ./apps/cortex-ai-worker
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://cortex:cortex@cortex-postgres:5432/cortex
      REDIS_URL: redis://cortex-redis:6379
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WORKER_SECRET: ${AI_WORKER_SECRET:-change-this-in-production}
      ENVIRONMENT: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8001/health').raise_for_status()\""]
      interval: "10s"
      timeout: "5s"
      retries: 5
      start_period: "15s"

volumes:
  postgres_data:
  redis_data:
  minio_data:
